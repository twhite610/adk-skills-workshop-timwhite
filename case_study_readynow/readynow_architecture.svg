<svg width="680" height="570" viewBox="0 0 680 570" xmlns="http://www.w3.org/2000/svg" role="img">
<title>ReadyNow! agent architecture</title>
<desc>A user sends a request to a root agent, which is logged and validated by callbacks, then routes to one of four specialist sub-agents (weather, search, routes, or Q&amp;A), whose draft response passes through a sequential critique-and-refine pipeline before returning to the user.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5e5e5e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<style>
.t{font-family:sans-serif;font-size:14px;fill:#1f1f1f;}
.ts{font-family:sans-serif;font-size:12px;fill:#5e5e5e;}
.th{font-family:sans-serif;font-size:14px;font-weight:500;fill:#1f1f1f;}
.box{fill:#ffffff;stroke:#888780;}
.arr{stroke:#5e5e5e;stroke-width:0.5;fill:none;}
.leader{stroke:#888780;stroke-width:0.5;stroke-dasharray:3,3;fill:none;}
.c-gray-fill{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5;}
.c-gray-text{fill:#2C2C2A;}
.c-coral-fill{fill:#FAECE7;stroke:#993C1D;stroke-width:0.5;}
.c-coral-title{fill:#4A1B0C;}
.c-coral-sub{fill:#712B13;}
.c-purple-fill{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5;}
.c-purple-title{fill:#26215C;}
.c-purple-sub{fill:#3C3489;}
.c-teal-fill{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5;}
.c-teal-title{fill:#04342C;}
.c-teal-sub{fill:#085041;}
.c-amber-fill{fill:#FAEEDA;stroke:#854F0B;stroke-width:0.5;}
.c-amber-title{fill:#412402;}
.c-amber-sub{fill:#633806;}
</style>

<line x1="340" y1="64" x2="340" y2="108" class="arr" marker-end="url(#arrow)"/>
<g>
<rect x="270" y="20" width="140" height="44" rx="8" class="c-gray-fill"/>
<text x="340" y="42" text-anchor="middle" dominant-baseline="central" class="th c-gray-text">User</text>
</g>

<g>
<rect x="220" y="110" width="240" height="56" rx="8" class="c-coral-fill"/>
<text x="340" y="128" text-anchor="middle" dominant-baseline="central" class="th c-coral-title">ReadyNow! root agent</text>
<text x="340" y="148" text-anchor="middle" dominant-baseline="central" class="ts c-coral-sub">Routes tasks &amp; validates input</text>
</g>

<line class="leader" x1="460" y1="138" x2="485" y2="137"/>
<circle cx="460" cy="138" r="2" fill="#5e5e5e"/>
<g>
<rect x="485" y="112" width="145" height="50" rx="8" class="box"/>
<text x="557.5" y="129" text-anchor="middle" dominant-baseline="central" class="th">Callbacks</text>
<text x="557.5" y="146" text-anchor="middle" dominant-baseline="central" class="ts">Logs &amp; validates</text>
</g>

<line x1="340" y1="166" x2="340" y2="186" class="arr"/>
<line x1="115.5" y1="186" x2="565.5" y2="186" class="arr"/>
<line x1="115.5" y1="186" x2="115.5" y2="206" class="arr" marker-end="url(#arrow)"/>
<line x1="265.5" y1="186" x2="265.5" y2="206" class="arr" marker-end="url(#arrow)"/>
<line x1="415.5" y1="186" x2="415.5" y2="206" class="arr" marker-end="url(#arrow)"/>
<line x1="565.5" y1="186" x2="565.5" y2="206" class="arr" marker-end="url(#arrow)"/>

<g>
<rect x="48" y="206" width="135" height="56" rx="8" class="c-purple-fill"/>
<text x="115.5" y="224" text-anchor="middle" dominant-baseline="central" class="th c-purple-title">Weather agent</text>
<text x="115.5" y="244" text-anchor="middle" dominant-baseline="central" class="ts c-purple-sub">Live alerts</text>
</g>
<g>
<rect x="198" y="206" width="135" height="56" rx="8" class="c-purple-fill"/>
<text x="265.5" y="224" text-anchor="middle" dominant-baseline="central" class="th c-purple-title">Search agent</text>
<text x="265.5" y="244" text-anchor="middle" dominant-baseline="central" class="ts c-purple-sub">News search</text>
</g>
<g>
<rect x="348" y="206" width="135" height="56" rx="8" class="c-purple-fill"/>
<text x="415.5" y="224" text-anchor="middle" dominant-baseline="central" class="th c-purple-title">Routes agent</text>
<text x="415.5" y="244" text-anchor="middle" dominant-baseline="central" class="ts c-purple-sub">Safe routes</text>
</g>
<g>
<rect x="498" y="206" width="135" height="56" rx="8" class="c-purple-fill"/>
<text x="565.5" y="224" text-anchor="middle" dominant-baseline="central" class="th c-purple-title">Q&amp;A agent</text>
<text x="565.5" y="244" text-anchor="middle" dominant-baseline="central" class="ts c-purple-sub">General help</text>
</g>

<line x1="115.5" y1="262" x2="115.5" y2="282" class="arr"/>
<line x1="265.5" y1="262" x2="265.5" y2="282" class="arr"/>
<line x1="415.5" y1="262" x2="415.5" y2="282" class="arr"/>
<line x1="565.5" y1="262" x2="565.5" y2="282" class="arr"/>
<line x1="115.5" y1="282" x2="565.5" y2="282" class="arr"/>
<line x1="340" y1="282" x2="340" y2="304" class="arr" marker-end="url(#arrow)"/>

<g>
<rect x="170" y="306" width="340" height="140" rx="16" class="c-teal-fill"/>
<text x="340" y="330" text-anchor="middle" dominant-baseline="central" class="th c-teal-title">Sequential pipeline</text>
<text x="340" y="346" text-anchor="middle" dominant-baseline="central" class="ts c-teal-sub">Validates &amp; refines response</text>
</g>
<g>
<rect x="190" y="360" width="140" height="56" rx="8" class="c-amber-fill"/>
<text x="260" y="378" text-anchor="middle" dominant-baseline="central" class="th c-amber-title">Critique agent</text>
<text x="260" y="398" text-anchor="middle" dominant-baseline="central" class="ts c-amber-sub">Checks quality</text>
</g>
<g>
<rect x="350" y="360" width="140" height="56" rx="8" class="c-amber-fill"/>
<text x="420" y="378" text-anchor="middle" dominant-baseline="central" class="th c-amber-title">Refine agent</text>
<text x="420" y="398" text-anchor="middle" dominant-baseline="central" class="ts c-amber-sub">Improves wording</text>
</g>

<line x1="340" y1="446" x2="340" y2="484" class="arr" marker-end="url(#arrow)"/>
<g>
<rect x="270" y="486" width="140" height="44" rx="8" class="c-gray-fill"/>
<text x="340" y="508" text-anchor="middle" dominant-baseline="central" class="th c-gray-text">Response</text>
</g>
</svg>
